events {}

http {

    upstream portfolio {
        server portfolio-app:80;
    }

    upstream flask {
        server flask-app:5000;
    }

    upstream java {
        server java-web-app:8080;
    }

    server {

        listen 80;

        location / {

            proxy_pass http://portfolio;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

        }

        location /api/ {

            proxy_pass http://flask/;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

        }

        location /java/ {

            proxy_pass http://java/;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

        }

    }

}
